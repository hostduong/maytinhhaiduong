{{ define "quen_mat_khau_master" }}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .TieuDe }} | 99K.VN Lõi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        
        input::-ms-reveal, input::-ms-clear { display: none; }
        input[type="password"]::-webkit-reveal, input[type="password"]::-webkit-clear { display: none; }
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #0f172a inset !important;
            -webkit-text-fill-color: #f8fafc !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .input-premium {
            width: 100%; padding: 0.85rem 1rem; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.1); 
            outline: none; transition: all 0.3s; background: rgba(255,255,255,0.05); color: #f8fafc; font-weight: 700;
        }
        .input-premium::placeholder { font-weight: 500; color: #64748b; opacity: 1; }
        .input-premium:focus { border-color: #ef4444; box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2); background: rgba(255,255,255,0.1); }
        
        .led-border-wrapper {
            position: relative; padding: 2px; border-radius: 1.5rem; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(239, 68, 68, 0.2);
        }
        .led-border-wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #ef4444, #f97316, transparent);
            animation: spin 3s linear infinite; z-index: 0;
        }
        .led-border-inner { position: relative; background: #0f172a; border-radius: calc(1.5rem - 2px); z-index: 10; border: 1px solid #1e293b; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .mystic-bg {
            background: radial-gradient(circle at 20% 30%, rgba(239, 68, 68, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(249, 115, 22, 0.05) 0%, transparent 40%);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .swal2-popup { padding: 0 !important; background: transparent !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center mystic-bg p-4 overflow-x-hidden">
    
    <div class="w-full max-w-md led-border-wrapper">
        <div class="led-border-inner p-8 sm:p-10 relative">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-red-500 to-orange-500 text-white mb-4 shadow-lg shadow-red-900/50 border border-red-400/30">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <h2 class="text-2xl font-black text-white tracking-widest uppercase">Khôi Phục Quyền Lực</h2>
                <p class="mt-2 text-[10px] text-red-500 font-bold uppercase tracking-[0.2em]">Xác thực OTP qua Email</p>
            </div>

            <div id="formEmail" class="space-y-5">
                <input type="text" style="display:none" autocomplete="username">
                <input type="password" style="display:none" autocomplete="new-password">

                <div id="step1">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Định danh Sáng Lập Viên</label>
                        <input type="text" id="otpUser" class="input-premium mb-5" placeholder="Nhập ID hoặc Email..." autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                    </div>
                    <button onclick="sendOtp()" id="btnSendOtp" class="w-full bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 text-white font-black uppercase tracking-widest py-4 rounded-xl transition shadow-lg shadow-red-900/40 active:scale-95">
                        Phát Tín Hiệu Cấp Mã
                    </button>
                </div>

                <div id="step2" class="hidden space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-emerald-400 uppercase tracking-widest mb-1.5">Nhập Mã OTP Từ Hộp Thư</label>
                        <input type="text" id="otpInput" maxlength="6" class="input-premium tracking-[0.4em] font-mono text-center !border-emerald-500/50 !text-emerald-400 focus:!box-shadow-[0_0_0_4px_rgba(16,185,129,0.2)]" placeholder="••••••" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                    </div>
                    
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Khóa Bảo Mật Mới</label>
                        <div class="relative">
                            <input id="otpNewPass" type="password" class="input-premium pr-10 font-mono tracking-[0.2em]" placeholder="Nhập mật khẩu mới..." autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                            <button type="button" onclick="togglePass('otpNewPass')" tabindex="-1" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-red-400 transition">
                                <svg id="eye_slash_otpNewPass" class="w-5 h-5 block" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.661-4.136m2.536-2.036A10.04 10.04 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.05 10.05 0 01-2.661 4.136M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 3l18 18" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                <svg id="eye_open_otpNewPass" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.458 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button onclick="resetByOtp()" id="btnResetByOtp" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-black uppercase tracking-widest py-4 rounded-xl transition shadow-lg shadow-emerald-900/40 active:scale-95">
                            Ghi Đè & Khôi Phục
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-8 text-center border-t border-slate-800 pt-6">
                <a href="/login" class="text-xs font-bold tracking-widest text-slate-500 hover:text-white uppercase transition flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Hủy Bỏ & Quay Về
                </a>
            </div>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const eyeSlash = document.getElementById('eye_slash_' + id); const eyeOpen = document.getElementById('eye_open_' + id);
            if (input.type === "password") { input.type = "text"; eyeSlash.classList.add('hidden'); eyeOpen.classList.remove('hidden'); } 
            else { input.type = "password"; eyeOpen.classList.add('hidden'); eyeSlash.classList.remove('hidden'); }
        }

        async function postData(url, d) {
            const fd = new FormData(); for(const k in d) fd.append(k,d[k]);
            try { const r = await fetch(url,{method:'POST',body:fd}); return await r.json(); }
            catch(e) { return {status:'error',msg:'Mất kết nối với Lõi Máy Chủ!'}; }
        }

        // HÀM HIỂN THỊ ALERT LỖI XỊN SÒ
        function showError(msg) {
            Swal.fire({
                background: 'transparent', backdrop: 'rgba(2, 6, 23, 0.85)', showConfirmButton: false,
                html: `
                <div class="relative p-[2px] rounded-[1.5rem] bg-gradient-to-r from-red-500 to-orange-500 shadow-2xl shadow-red-500/20 max-w-[400px] mx-auto">
                    <div class="bg-slate-900 rounded-[1.4rem] p-8 flex flex-col items-center text-center border border-slate-800">
                        <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mb-4 text-red-500 border border-red-500/20">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <h2 class="text-2xl font-black text-white mb-2 uppercase tracking-wider">Thất Bại</h2>
                        <p class="font-medium text-slate-400 mb-8">${msg}</p>
                        <button onclick="Swal.close()" class="w-full py-3 px-4 rounded-xl text-white bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 font-black shadow-lg active:scale-95 uppercase tracking-widest transition">Đã Hiểu</button>
                    </div>
                </div>`
            });
        }

        // HÀM HIỂN THỊ ALERT THÀNH CÔNG XỊN SÒ (CÓ VIỀN LED)
        function showSuccess(msg) {
            Swal.fire({
                background: 'transparent', backdrop: 'rgba(2, 6, 23, 0.85)', showConfirmButton: false, allowOutsideClick: false,
                html: `
                <div class="led-border-wrapper mx-auto max-w-[400px]">
                    <div class="bg-slate-900 rounded-[calc(1.5rem-2px)] p-8 relative flex flex-col items-center text-center border border-slate-800">
                        <div class="w-16 h-16 rounded-full bg-emerald-500/10 flex items-center justify-center mb-4 text-emerald-400 border border-emerald-500/20">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h2 class="text-2xl font-black text-white mb-2 uppercase tracking-wider">Thành Công</h2>
                        <p class="font-medium text-slate-400 mb-8">${msg}</p>
                        <button onclick="window.location.href='/login'" class="w-full py-3 px-4 rounded-xl text-white bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 font-black shadow-lg active:scale-95 uppercase tracking-widest transition">Về Cổng Đăng Nhập</button>
                    </div>
                </div>`
            });
        }

        async function sendOtp() {
            const userVal = document.getElementById('otpUser').value.trim();
            if (!userVal) { showError('Vui lòng nhập định danh Sáng Lập Viên.'); return; }

            const btn = document.getElementById('btnSendOtp'); btn.disabled = true; btn.innerText = 'ĐANG PHÁT TÍN HIỆU...';
            const r = await postData('/api/auth/send-otp', {dinh_danh: userVal});
            btn.disabled = false; btn.innerText = 'PHÁT TÍN HIỆU CẤP MÃ';
            
            if(r.status === 'ok') {
                document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden');
                Swal.fire({
                    background: '#0f172a', color: '#34d399', iconColor: '#34d399', icon: 'info', 
                    title: 'Đã phát tín hiệu', text: 'Mã giải cứu đã được gửi đến email đăng ký.', 
                    toast: true, position: 'top-end', timer: 4000, showConfirmButton: false, customClass: {popup: 'border border-slate-800'}
                });
            } else { showError(r.msg); }
        }

        async function resetByOtp() {
            const userVal = document.getElementById('otpUser').value;
            const otpVal = document.getElementById('otpInput').value;
            const passVal = document.getElementById('otpNewPass').value;

            if(otpVal.length !== 6) { showError('Mã OTP phải đủ 6 chữ số!'); return; }
            if(passVal.length < 8) { showError('Khóa bảo mật phải từ 8 ký tự trở lên!'); return; }

            const btn = document.getElementById('btnResetByOtp'); btn.disabled = true; btn.innerText = 'ĐANG XỬ LÝ...';
            const r = await postData('/api/auth/reset-by-otp', {dinh_danh: userVal, otp: otpVal, pass_moi: passVal});
            btn.disabled = false; btn.innerText = 'GHI ĐÈ & KHÔI PHỤC';
            
            if(r.status === 'ok') { showSuccess('Khóa bảo mật lõi đã được ghi đè thành công!'); } 
            else { showError(r.msg); }
        }
    </script>
</body>
</html>
{{ end }}
