{{ define "quen_mat_khau_master" }}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .TieuDe }} | 99K.VN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/99k-style.css"> 

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        
        input::-ms-reveal, input::-ms-clear { display: none; }
        input[type="password"]::-webkit-reveal, input[type="password"]::-webkit-clear { display: none; }
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: #1e293b !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .input-premium {
            width: 100%; padding: 0.85rem 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; 
            outline: none; transition: all 0.3s; background-color: #ffffff; color: #1e293b; font-weight: 700;
        }
        .input-premium::placeholder { font-weight: 500; color: #94a3b8; opacity: 1; }
        .input-premium:focus { border-color: #8b5cf6; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); }
        
        .led-border-wrapper {
            position: relative; padding: 3px; border-radius: 1.5rem; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(139, 92, 246, 0.3);
        }
        .led-border-wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #c084fc, #6d28d9, transparent);
            animation: spin-slow 3s linear infinite; z-index: 0;
        }
        .led-border-inner { position: relative; background: #f8fafc; border-radius: calc(1.5rem - 3px); z-index: 10; }
        
        .mystic-bg {
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(79, 70, 229, 0.15) 0%, transparent 40%);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center mystic-bg p-4 overflow-x-hidden">
    
    <div class="w-full max-w-md led-border-wrapper">
        <div class="led-border-inner p-8 sm:p-10 relative">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-violet-600 to-indigo-600 text-white mb-4 shadow-lg shadow-violet-500/40 border-4 border-white">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Khôi Phục Quyền Lực</h2>
                <p class="mt-2 text-[10px] text-violet-600 font-bold uppercase tracking-[0.2em]">Xác thực OTP qua Email</p>
            </div>

            <div id="formEmail" class="space-y-5 relative z-10">
                <input type="text" style="display:none" autocomplete="username">
                <input type="password" style="display:none" autocomplete="new-password">

                <div id="step1">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Định danh Sáng Lập Viên</label>
                        <input type="text" id="otpUser" class="input-premium mb-5" placeholder="Nhập ID hoặc Email..." autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                    </div>
                    <button onclick="sendOtp()" id="btnSendOtp" class="w-full flex justify-center items-center gap-2 py-4 px-4 border border-transparent text-sm font-black tracking-[0.2em] rounded-xl text-white bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-700 hover:to-indigo-700 shadow-xl shadow-violet-500/30 transition transform hover:-translate-y-1 active:scale-95 uppercase">
                        Phát Tín Hiệu Cấp Mã
                    </button>
                </div>

                <div id="step2" class="hidden space-y-5">
                    <div>
                        <label class="block text-[11px] font-bold text-violet-600 uppercase tracking-wider mb-1.5">Nhập Mã OTP (6 số)</label>
                        <input type="text" id="otpInput" maxlength="6" class="input-premium tracking-[0.4em] font-mono text-center !border-violet-300 !text-violet-700 focus:!border-violet-500" placeholder="••••••" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                    </div>
                    
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Khóa Bảo Mật Mới</label>
                        <div class="relative">
                            <input id="otpNewPass" type="password" class="input-premium pr-10 font-mono tracking-[0.2em]" placeholder="Nhập mật khẩu mới..." autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                            <button type="button" onclick="togglePass('otpNewPass')" tabindex="-1" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-violet-600 transition">
                                <svg id="eye_slash_otpNewPass" class="w-5 h-5 block" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.661-4.136m2.536-2.036A10.04 10.04 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.05 10.05 0 01-2.661 4.136M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 3l18 18" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                <svg id="eye_open_otpNewPass" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.458 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button onclick="resetByOtp()" id="btnResetByOtp" class="w-full flex justify-center items-center gap-2 py-4 px-4 border border-transparent text-sm font-black tracking-[0.2em] rounded-xl text-white bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 shadow-xl shadow-emerald-500/30 transition transform hover:-translate-y-1 active:scale-95 uppercase">
                            Ghi Đè & Khôi Phục
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-8 text-center border-t border-slate-200 pt-6">
                <a href="/login" class="text-[11px] font-bold tracking-widest text-slate-500 hover:text-violet-600 uppercase transition flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Quay Về Trạm Đăng Nhập
                </a>
            </div>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const eyeSlash = document.getElementById('eye_slash_' + id); const eyeOpen = document.getElementById('eye_open_' + id);
            if (input.type === "password") { input.type = "text"; eyeSlash.classList.add('hidden'); eyeOpen.classList.remove('hidden'); } 
            else { input.type = "password"; eyeOpen.classList.add('hidden'); eyeSlash.classList.remove('hidden'); }
        }

        async function postData(url, d) {
            const fd = new FormData(); for(const k in d) fd.append(k,d[k]);
            try { const r = await fetch(url,{method:'POST',body:fd}); return await r.json(); }
            catch(e) { return {status:'error',msg:'Mất kết nối với Lõi Máy Chủ!'}; }
        }

        // TẬN DỤNG TRỰC TIẾP CLASS SWAL-MASTER-ERROR
        function showError(msg) {
            Swal.fire({
                html: `
                <div class="flex flex-col items-center gap-3">
                    <div class="w-16 h-16 bg-gradient-to-br from-red-100 to-orange-100 text-orange-600 rounded-full flex items-center justify-center shadow-inner border border-orange-200">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>
                    <span class="text-3xl font-black title-gradient-red uppercase tracking-widest mt-2">Thất Bại</span>
                    <div class="text-[15px] text-orange-900 font-bold px-4 mb-2">${msg}</div>
                </div>`,
                customClass: { 
                    popup: 'swal-master-error', 
                    confirmButton: 'bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold rounded-xl px-12 py-3.5 shadow-lg shadow-orange-200 transition transform hover:-translate-y-0.5 active:scale-95 uppercase tracking-widest mt-4'
                },
                buttonsStyling: false,
                confirmButtonText: 'Đã Hiểu'
            });
        }

        // TẬN DỤNG TRỰC TIẾP CLASS SWAL-MASTER-SUCCESS
        function showSuccess(title, msg, btnText, redirectUrl) {
            Swal.fire({
                html: `
                <div class="flex flex-col items-center gap-3">
                    <div class="w-16 h-16 bg-gradient-to-br from-green-100 to-emerald-100 text-emerald-600 rounded-full flex items-center justify-center shadow-inner border border-emerald-200">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <span class="text-3xl font-black title-gradient-purple uppercase tracking-widest mt-2">${title}</span>
                    <div class="text-[15px] text-slate-600 font-bold px-4 mb-2">${msg}</div>
                </div>`,
                customClass: { 
                    popup: 'swal-master-success', 
                    confirmButton: 'bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-700 hover:to-indigo-700 text-white font-bold rounded-xl px-12 py-3.5 shadow-lg shadow-violet-200 transition transform hover:-translate-y-0.5 active:scale-95 uppercase tracking-widest mt-4'
                },
                buttonsStyling: false,
                confirmButtonText: btnText,
                allowOutsideClick: false
            }).then(() => {
                if(redirectUrl) window.location.href = redirectUrl;
            });
        }

        async function sendOtp() {
            const userVal = document.getElementById('otpUser').value.trim();
            if (!userVal) { showError('Vui lòng nhập định danh Sáng Lập Viên.'); return; }

            const btn = document.getElementById('btnSendOtp'); btn.disabled = true; btn.innerText = 'ĐANG PHÁT TÍN HIỆU...';
            const r = await postData('/api/auth/send-otp', {dinh_danh: userVal});
            btn.disabled = false; btn.innerText = 'PHÁT TÍN HIỆU CẤP MÃ';
            
            if(r.status === 'ok') {
                document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden');
                
                // HIỂN THỊ HỘP THÔNG BÁO XÁC NHẬN ĐÃ GỬI THÀNH CÔNG (Không redirect)
                showSuccess('Tín Hiệu Đã Gửi', 'Mã xác thực OTP đã được gửi đến hòm thư của bạn.', 'Tiếp Tục', null);
            } else { showError(r.msg); }
        }

        async function resetByOtp() {
            const userVal = document.getElementById('otpUser').value;
            const otpVal = document.getElementById('otpInput').value;
            const passVal = document.getElementById('otpNewPass').value;

            if(otpVal.length !== 6) { showError('Mã OTP phải đủ 6 chữ số!'); return; }
            if(passVal.length < 8) { showError('Khóa bảo mật phải từ 8 ký tự trở lên!'); return; }

            const btn = document.getElementById('btnResetByOtp'); btn.disabled = true; btn.innerText = 'ĐANG XỬ LÝ...';
            const r = await postData('/api/auth/reset-by-otp', {dinh_danh: userVal, otp: otpVal, pass_moi: passVal});
            btn.disabled = false; btn.innerText = 'GHI ĐÈ & KHÔI PHỤC';
            
            if(r.status === 'ok') { 
                // HIỂN THỊ THÀNH CÔNG VÀ CHUYỂN VỀ LOGIN
                showSuccess('Đã Khôi Phục', 'Khóa bảo mật lõi đã được ghi đè thành công!', 'Về Cổng Đăng Nhập', '/login'); 
            } else { showError(r.msg); }
        }
    </script>
</body>
</html>
{{ end }}
