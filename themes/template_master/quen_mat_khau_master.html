{{ define "quen_mat_khau_master" }}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .TieuDe }} | 99K.VN Lõi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        
        input::-ms-reveal, input::-ms-clear { display: none; }
        input[type="password"]::-webkit-reveal, input[type="password"]::-webkit-clear { display: none; }

        .input-premium {
            width: 100%; padding: 0.85rem 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; 
            outline: none; transition: all 0.3s; background-color: #ffffff; color: #1e293b; font-weight: 700;
        }
        .input-premium::placeholder { font-weight: 500; color: #94a3b8; opacity: 1; }
        .input-premium:focus { border-color: #8b5cf6; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); }
        
        .led-border-wrapper {
            position: relative; padding: 3px; border-radius: 1.5rem; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(139, 92, 246, 0.3);
        }
        .led-border-wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #ef4444, #f97316, transparent);
            animation: spin 3s linear infinite; z-index: 0;
        }
        .led-border-inner { position: relative; background: #f8fafc; border-radius: calc(1.5rem - 3px); z-index: 10; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .mystic-bg {
            background: radial-gradient(circle at 20% 30%, rgba(239, 68, 68, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(249, 115, 22, 0.1) 0%, transparent 40%);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        
        .tab-active { border-bottom: 3px solid #ef4444; color: #ef4444; }
        .swal2-popup { border-radius: 1.5rem !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center mystic-bg p-4 overflow-x-hidden">
    
    <div class="w-full max-w-md led-border-wrapper">
        <div class="led-border-inner p-8 sm:p-10 relative">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white mb-4 shadow-lg shadow-red-500/40 border-4 border-white">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Khôi Phục Quyền Lực</h2>
                <p class="mt-2 text-[10px] text-red-500 font-bold uppercase tracking-[0.2em]">Quy Trình Recovery Khẩn Cấp</p>
            </div>

            <div class="flex border-b border-slate-200 mb-6">
                <button onclick="switchTab('pin')" id="btnTabPin" class="flex-1 pb-3 text-[11px] font-black tracking-widest uppercase tab-active transition">Mã PIN</button>
                <button onclick="switchTab('email')" id="btnTabEmail" class="flex-1 pb-3 text-[11px] font-black tracking-widest uppercase text-slate-400 hover:text-slate-600 transition">Mã Email</button>
            </div>

            <div id="formPin" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Định danh Master</label>
                    <input type="text" id="pinUser" class="input-premium" placeholder="Nhập ID hoặc Email...">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Mã PIN Bí Mật</label>
                    <input type="password" id="pinCode" maxlength="8" class="input-premium tracking-[0.3em] font-mono text-center" placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Khóa Bảo Mật Mới</label>
                    <input type="password" id="pinNewPass" class="input-premium" placeholder="Nhập mật khẩu mới...">
                </div>
                
                <div class="pt-3">
                    <button onclick="resetByPin()" id="btnResetByPin" class="w-full bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 text-white font-black uppercase tracking-widest py-4 rounded-xl transition shadow-lg shadow-red-500/30 active:scale-95">
                        Ghi Đè Khóa Mới
                    </button>
                </div>
            </div>

            <div id="formEmail" class="space-y-4 hidden">
                <div id="step1">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Định danh Master</label>
                        <input type="text" id="otpUser" class="input-premium mb-4" placeholder="Nhập ID hoặc Email...">
                    </div>
                    <div class="pt-2">
                        <button onclick="sendOtp()" id="btnSendOtp" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-black uppercase tracking-widest py-4 rounded-xl transition shadow-lg shadow-blue-500/30 active:scale-95">
                            Yêu Cầu Cấp Mã OTP
                        </button>
                    </div>
                </div>

                <div id="step2" class="hidden space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 text-blue-600">Nhập Mã OTP Từ Hộp Thư</label>
                        <input type="text" id="otpInput" maxlength="6" class="input-premium tracking-[0.3em] font-mono text-center border-blue-200" placeholder="••••••">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Khóa Bảo Mật Mới</label>
                        <input type="password" id="otpNewPass" class="input-premium" placeholder="Nhập mật khẩu mới...">
                    </div>
                    <div class="pt-3">
                        <button onclick="resetByOtp()" id="btnResetByOtp" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-black uppercase tracking-widest py-4 rounded-xl transition shadow-lg shadow-emerald-500/30 active:scale-95">
                            Xác Nhận & Khôi Phục
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-8 text-center border-t border-slate-100 pt-6">
                <a href="/login" class="text-xs font-bold tracking-widest text-slate-400 hover:text-slate-600 uppercase transition flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Quay Về Trạm Đăng Nhập
                </a>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('formPin').classList.toggle('hidden', tab !== 'pin');
            document.getElementById('formEmail').classList.toggle('hidden', tab !== 'email');
            document.getElementById('btnTabPin').classList.toggle('tab-active', tab === 'pin');
            document.getElementById('btnTabPin').classList.toggle('text-slate-400', tab !== 'pin');
            document.getElementById('btnTabEmail').classList.toggle('tab-active', tab === 'email');
            document.getElementById('btnTabEmail').classList.toggle('text-slate-400', tab !== 'email');
        }

        async function postData(url, d) {
            const fd = new FormData(); for(const k in d) fd.append(k,d[k]);
            try { const r = await fetch(url,{method:'POST',body:fd}); return await r.json(); }
            catch(e) { return {status:'error',msg:'Mất kết nối với Lõi Máy Chủ!'}; }
        }

        async function resetByPin() {
            const btn = document.getElementById('btnResetByPin'); btn.disabled = true; btn.innerText = 'ĐANG XỬ LÝ...';
            const r = await postData('/api/auth/reset-by-pin', {dinh_danh: document.getElementById('pinUser').value, pin: document.getElementById('pinCode').value, pass_moi: document.getElementById('pinNewPass').value});
            btn.disabled = false; btn.innerText = 'GHI ĐÈ KHÓA MỚI';
            if(r.status === 'ok') Swal.fire({icon:'success', title:'Thành công', text:r.msg, confirmButtonColor: '#10b981'}).then(()=>location.href='/login');
            else Swal.fire({icon:'error', title:'Truy cập từ chối', text:r.msg, confirmButtonColor: '#ef4444'});
        }

        async function sendOtp() {
            const btn = document.getElementById('btnSendOtp'); btn.disabled = true; btn.innerText = 'ĐANG PHÁT TÍN HIỆU...';
            const r = await postData('/api/auth/send-otp', {dinh_danh: document.getElementById('otpUser').value});
            btn.disabled = false; btn.innerText = 'YÊU CẦU CẤP MÃ OTP';
            if(r.status === 'ok') {
                document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden');
                Swal.fire({icon:'info', title:'Đã gửi tín hiệu', text:'Mã giải cứu đã được gửi đến email đăng ký.', confirmButtonColor: '#3b82f6', toast: true, position: 'top-end', timer: 3000, showConfirmButton: false});
            } else Swal.fire({icon:'error', title:'Thất bại', text:r.msg, confirmButtonColor: '#ef4444'});
        }

        async function resetByOtp() {
            const btn = document.getElementById('btnResetByOtp'); btn.disabled = true; btn.innerText = 'ĐANG XỬ LÝ...';
            const r = await postData('/api/auth/reset-by-otp', {dinh_danh: document.getElementById('otpUser').value, otp: document.getElementById('otpInput').value, pass_moi: document.getElementById('otpNewPass').value});
            btn.disabled = false; btn.innerText = 'XÁC NHẬN & KHÔI PHỤC';
            if(r.status === 'ok') Swal.fire({icon:'success', title:'Thành công', text:r.msg, confirmButtonColor: '#10b981'}).then(()=>location.href='/login');
            else Swal.fire({icon:'error', title:'Thất bại', text:r.msg, confirmButtonColor: '#ef4444'});
        }
    </script>
</body>
</html>
{{ end }}
