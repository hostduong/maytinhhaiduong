{{ define "dang_nhap_master" }}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .TieuDe }} | 99K.VN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/99k-style.css"> 

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        
        input::-ms-reveal, input::-ms-clear { display: none; }
        input[type="password"]::-webkit-reveal, input[type="password"]::-webkit-clear { display: none; }
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: #1e293b !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .input-premium {
            width: 100%; padding: 0.85rem 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; 
            outline: none; transition: all 0.3s; background-color: #ffffff; color: #1e293b; font-weight: 700;
        }
        .input-premium::placeholder { font-weight: 500; color: #94a3b8; opacity: 1; }
        .input-premium:focus { border-color: #8b5cf6; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); }
        
        .led-border-wrapper {
            position: relative; padding: 3px; border-radius: 1.5rem; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(139, 92, 246, 0.3);
        }
        .led-border-wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #c084fc, #6d28d9, transparent);
            animation: spin-slow 3s linear infinite; z-index: 0;
        }
        .led-border-inner { position: relative; background: #f8fafc; border-radius: calc(1.5rem - 3px); z-index: 10; }
        
        .mystic-bg {
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(79, 70, 229, 0.15) 0%, transparent 40%);
        }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .checkbox-custom { accent-color: #8b5cf6; width: 1.25rem; height: 1.25rem; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center mystic-bg p-4 overflow-x-hidden">
    
    <div class="w-full max-w-md led-border-wrapper">
        <div class="led-border-inner p-8 sm:p-10 relative">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-violet-600 to-indigo-600 text-white mb-4 shadow-lg shadow-violet-500/40 border-4 border-white">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight">Xác Thực Lõi</h2>
                <p class="mt-2 text-xs text-violet-600 font-bold uppercase tracking-[0.2em]">Trạm Định Tuyến Tuyệt Mật</p>
            </div>

            <form id="formLogin" autocomplete="off" spellcheck="false" class="space-y-5 relative z-10">
                <input type="text" style="display:none" autocomplete="username">
                <input type="password" style="display:none" autocomplete="current-password">

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Định danh Sáng Lập Viên</label>
                    <input type="text" name="input_dinh_danh" class="input-premium" placeholder="Nhập ID, Email hoặc Username..." autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');" required>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider">Khóa Bảo Mật</label>
                        <a href="/forgot-password" class="text-[11px] text-violet-600 hover:text-violet-800 font-bold uppercase tracking-wider transition">Quên khóa?</a>
                    </div>
                    <div class="relative">
                        <input id="mat_khau" name="mat_khau" type="password" class="input-premium pr-10 font-mono tracking-[0.2em]" placeholder="••••••••" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');" required>
                        <button type="button" onclick="togglePass('mat_khau')" tabindex="-1" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-violet-600 transition">
                            <svg id="eye_slash_mat_khau" class="w-5 h-5 block" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.661-4.136m2.536-2.036A10.04 10.04 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.05 10.05 0 01-2.661 4.136M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 3l18 18" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            <svg id="eye_open_mat_khau" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.458 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center pt-2">
                    <input id="ghi_nho" name="ghi_nho" type="checkbox" class="checkbox-custom rounded border-slate-300">
                    <label for="ghi_nho" class="ml-2 text-sm font-bold text-slate-600 cursor-pointer select-none">Duy trì kết nối vĩnh viễn</label>
                </div>

                <div class="pt-4">
                    <button type="submit" id="btnSubmit" class="w-full flex justify-center items-center gap-2 py-4 px-4 border border-transparent text-sm font-black tracking-[0.2em] rounded-xl text-white bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-700 hover:to-indigo-700 shadow-xl shadow-violet-500/30 transition transform hover:-translate-y-1 active:scale-95 uppercase">
                        Kích Hoạt Phiên Lõi
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const eyeSlash = document.getElementById('eye_slash_' + id); const eyeOpen = document.getElementById('eye_open_' + id);
            if (input.type === "password") { input.type = "text"; eyeSlash.classList.add('hidden'); eyeOpen.classList.remove('hidden'); } 
            else { input.type = "password"; eyeOpen.classList.add('hidden'); eyeSlash.classList.remove('hidden'); }
        }

        // TẬN DỤNG TRỰC TIẾP CLASS CSS 99K-STYLE CHO LỖI
        function showError(msg) {
            Swal.fire({
                html: `
                <div class="flex flex-col items-center gap-3">
                    <div class="w-16 h-16 bg-gradient-to-br from-red-100 to-orange-100 text-orange-600 rounded-full flex items-center justify-center shadow-inner border border-orange-200">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>
                    <span class="text-3xl font-black title-gradient-red uppercase tracking-widest mt-2">Thất Bại</span>
                    <div class="text-[15px] text-orange-900 font-bold px-4 mb-2">${msg}</div>
                </div>`,
                customClass: { 
                    popup: 'swal-master-error', 
                    confirmButton: 'bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold rounded-xl px-12 py-3.5 shadow-lg shadow-orange-200 transition transform hover:-translate-y-0.5 active:scale-95 uppercase tracking-widest mt-4'
                },
                buttonsStyling: false,
                confirmButtonText: 'Đã Hiểu'
            });
        }

        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const btn = document.getElementById('btnSubmit'); 
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> ĐANG KẾT NỐI...`;

            const fd = new FormData(this);
            fd.set('ghi_nho', document.getElementById('ghi_nho').checked);

            try {
                const res = await fetch('/login', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.status === 'ok') { window.location.href = data.redirect; } 
                else {
                    btn.disabled = false; btn.innerHTML = `KÍCH HOẠT PHIÊN LÕI`;
                    showError(data.msg); 
                }
            } catch (error) {
                btn.disabled = false; btn.innerHTML = `KÍCH HOẠT PHIÊN LÕI`;
                showError('Mất kết nối với Lõi Máy Chủ!');
            }
        });
    </script>
</body>
</html>
{{ end }}
