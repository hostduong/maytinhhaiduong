{{ define "portal_khach_hang" }}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .TieuDe }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/99k-style.css"> 
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen py-12 flex flex-col items-center">

    <div class="max-w-5xl mx-auto px-4 w-full">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black text-gradient-animated mb-4">Gói Cước Khởi Nghiệp</h1>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-sm">Hệ thống SaaS chuyên nghiệp cho cửa hàng máy tính</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            {{ range .ListGoi }}
            <div class="bg-white border border-slate-200 rounded-[2rem] p-8 shadow-sm hover:shadow-2xl transition duration-500 flex flex-col group">
                <div class="mb-6 border-b border-slate-50 pb-6 text-center">
                    <h3 class="text-xl font-black text-slate-800 uppercase">{{ .TenGoi }}</h3>
                    <div class="mt-4 flex items-baseline justify-center gap-1">
                        <span class="text-4xl font-black text-purple-600 tracking-tighter">{{ format_money .GiaBan }}₫</span>
                        <span class="text-slate-400 font-bold text-xs">/{{ .ThoiHanNgay }} ngày</span>
                    </div>
                </div>

                <div class="flex-1 space-y-4 mb-8">
                    {{ range split .MoTa "|" }}
                        <div class="flex items-center gap-3 text-sm font-bold text-slate-500">
                            <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            {{ . }}
                        </div>
                    {{ end }}
                </div>

                <button onclick="moModalMua('{{ .MaGoi }}', '{{ .TenGoi }}', {{ .GiaBan }})" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-purple-600 transition shadow-lg active:scale-95">
                    Chọn Gói Này
                </button>
            </div>
            {{ end }}
        </div>
    </div>

    <script>
        // Hàm gọi Backend để kiểm tra giá (Zero Trust)
        async function checkGiaTuServer(maGoi, maCode) {
            const fd = new FormData();
            fd.append('ma_goi', maGoi);
            fd.append('ma_code', maCode);
            const res = await fetch('/khach-hang/api/check-price', { method: 'POST', body: fd });
            return await res.json();
        }

        function moModalMua(maGoi, tenGoi, giaGoc) {
            Swal.fire({
                title: `<span class="text-2xl font-black text-purple-600">${tenGoi}</span>`,
                html: `
                    <div class="p-2">
                        <div class="mb-4 text-sm font-bold text-slate-400">Giá gốc: ${giaGoc.toLocaleString()}₫</div>
                        <input type="text" id="inp_code" class="input-premium text-center font-black uppercase tracking-widest" placeholder="MÃ GIẢM GIÁ">
                        <div id="price_box" class="mt-6 p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                            <div class="text-xs font-black text-slate-400 uppercase mb-1">Số tiền cần trả</div>
                            <div id="final_txt" class="text-3xl font-black text-slate-800">${giaGoc.toLocaleString()}₫</div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Xác nhận kích hoạt',
                customClass: { popup: 'swal-animated-purple' },
                didOpen: () => {
                    const inp = document.getElementById('inp_code');
                    const txt = document.getElementById('final_txt');
                    const box = document.getElementById('price_box');

                    inp.addEventListener('input', async (e) => {
                        const code = e.target.value.trim();
                        if(code.length < 2) {
                            txt.innerText = giaGoc.toLocaleString() + '₫';
                            box.classList.replace('border-emerald-500', 'border-slate-200');
                            return;
                        }
                        // HỎI SERVER CHỨ KHÔNG TỰ TÍNH
                        const data = await checkGiaTuServer(maGoi, code);
                        if(data.status === 'ok') {
                            txt.innerText = data.final_price.toLocaleString() + '₫';
                            if(data.is_valid) box.classList.replace('border-slate-200', 'border-emerald-500');
                        }
                    });
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const code = document.getElementById('inp_code').value.trim();
                    
                    Swal.fire({ title: 'Đang xử lý...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                    const fd = new FormData();
                    fd.append('ma_goi', maGoi);
                    fd.append('ma_code', code);

                    const res = await fetch('/khach-hang/api/mua-goi', { method: 'POST', body: fd });
                    const data = await res.json();

                    if(data.status === 'ok') {
                        window.location.href = data.redirect_url;
                    } else {
                        Swal.fire('Lỗi', data.msg, 'error');
                    }
                }
            });
        }
    </script>
</body>
</html>
{{ end }}
