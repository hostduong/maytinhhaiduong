{{ define "quen_mat_khau" }}
    {{ template "header" . }}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style> 
        input::-ms-reveal, input::-ms-clear { display: none; }
        input[type="password"]::-webkit-reveal, input[type="password"]::-webkit-clear { display: none; }
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: #1f2937 !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; background-color: #9ca3af !important; }
        .swal2-popup { padding: 0 !important; background: transparent !important; }
    </style>

    <div class="bg-gray-50 min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-4">
        <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-xl shadow-indigo-900/5 w-full max-w-md border border-indigo-50 relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-600 mb-4 border border-indigo-100 shadow-inner">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                </div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Khôi Phục Mật Khẩu</h1>
                <p class="text-xs font-bold text-indigo-500 uppercase tracking-widest mt-2">Xác Thực OTP Qua Email</p>
            </div>

            <div id="formEmail" class="space-y-5">
                <input type="text" style="display:none" autocomplete="username">
                <input type="password" style="display:none" autocomplete="new-password">

                <div id="step1">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Định Danh / Email</label>
                        <input type="text" id="otpUser" placeholder="Nhập ID hoặc Email..." class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition font-bold text-slate-800 mb-5" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                    </div>
                    <button id="btnSendOtp" onclick="sendOtp()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black tracking-widest uppercase hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition active:scale-95">PHÁT TÍN HIỆU CẤP MÃ</button>
                </div>
                
                <div id="step2" class="hidden space-y-5">
                    <div>
                        <label class="block text-[11px] font-bold text-emerald-600 uppercase tracking-wider mb-1.5">Nhập Mã OTP (6 số)</label>
                        <input type="text" id="otpInput" maxlength="6" placeholder="••••••" class="w-full px-4 py-3 border-2 border-emerald-200 rounded-xl focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition font-mono tracking-[0.4em] font-bold text-emerald-700 text-center" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Mật Khẩu Mới</label>
                        <div class="relative">
                            <input type="password" id="otpNewPass" placeholder="Nhập mật khẩu mới..." class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition font-mono tracking-[0.2em] font-bold text-slate-800 pr-10" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                            <button type="button" onclick="togglePass('otpNewPass')" tabindex="-1" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-indigo-600 transition">
                                <svg id="eye_slash_otpNewPass" class="w-5 h-5 block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.661-4.136m2.536-2.036A10.04 10.04 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.05 10.05 0 01-2.661 4.136M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/></svg>
                                <svg id="eye_open_otpNewPass" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </div>
                    <button id="btnResetByOtp" onclick="resetByOtp()" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-black tracking-widest uppercase hover:bg-emerald-600 shadow-lg shadow-emerald-500/30 transition active:scale-95 mt-2">XÁC NHẬN & GHI ĐÈ</button>
                </div>
            </div>

            <div class="mt-8 pt-6 text-center border-t border-slate-100">
                <a href="/login" class="text-xs font-bold text-slate-500 hover:text-indigo-600 uppercase tracking-widest transition flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Quay Về Đăng Nhập
                </a>
            </div>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const eyeSlash = document.getElementById('eye_slash_' + id); const eyeOpen = document.getElementById('eye_open_' + id);
            if (input.type === "password") { input.type = "text"; eyeSlash.classList.add('hidden'); eyeOpen.classList.remove('hidden'); } 
            else { input.type = "password"; eyeOpen.classList.add('hidden'); eyeSlash.classList.remove('hidden'); }
        }

        async function postData(url, d) { 
            const fd=new FormData(); for(const k in d) fd.append(k,d[k]); 
            try{ const r=await fetch(url,{method:'POST',body:fd}); return await r.json(); }catch(e){return {status:'error',msg:'Lỗi mạng'};} 
        }

        function showError(msg) {
            Swal.fire({
                background: 'transparent', backdrop: 'rgba(15, 23, 42, 0.5)', showConfirmButton: false,
                html: `
                <div class="relative p-[2px] rounded-[1.5rem] bg-gradient-to-r from-red-500 to-orange-500 shadow-2xl shadow-red-500/20 max-w-[360px] mx-auto">
                    <div class="bg-white rounded-[1.4rem] p-8 flex flex-col items-center text-center">
                        <div class="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mb-4 text-red-500 border border-red-100">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <h2 class="text-2xl font-black text-slate-800 mb-2">Thất Bại</h2>
                        <p class="font-medium text-slate-500 mb-8">${msg}</p>
                        <button onclick="Swal.close()" class="w-full py-3 px-4 rounded-xl text-white bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 font-bold shadow-md active:scale-95 transition uppercase tracking-widest">Đã Hiểu</button>
                    </div>
                </div>`
            });
        }

        function showSuccess(msg) {
            Swal.fire({
                background: 'transparent', backdrop: 'rgba(15, 23, 42, 0.5)', showConfirmButton: false, allowOutsideClick: false,
                html: `
                <div class="relative p-[2px] rounded-[1.5rem] bg-gradient-to-r from-emerald-400 to-teal-500 shadow-2xl shadow-emerald-500/20 max-w-[360px] mx-auto">
                    <div class="bg-white rounded-[1.4rem] p-8 flex flex-col items-center text-center">
                        <div class="w-16 h-16 rounded-full bg-emerald-50 flex items-center justify-center mb-4 text-emerald-500 border border-emerald-100">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h2 class="text-2xl font-black text-slate-800 mb-2">Thành Công</h2>
                        <p class="font-medium text-slate-500 mb-8">${msg}</p>
                        <button onclick="window.location.href='/login'" class="w-full py-3 px-4 rounded-xl text-white bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 font-bold shadow-md active:scale-95 transition uppercase tracking-widest">Về Đăng Nhập</button>
                    </div>
                </div>`
            });
        }
        
        async function sendOtp() { 
            const userVal = document.getElementById('otpUser').value.trim();
            if (!userVal) { showError('Vui lòng nhập định danh.'); return; }
            
            const btn = document.getElementById('btnSendOtp');
            btn.disabled = true; btn.innerText = 'ĐANG PHÁT TÍN HIỆU...'; 
            const r=await postData('/api/auth/send-otp',{dinh_danh:userVal}); 
            btn.disabled = false; btn.innerText = 'PHÁT TÍN HIỆU CẤP MÃ';

            if(r.status==='ok'){ 
                document.getElementById('step1').classList.add('hidden'); 
                document.getElementById('step2').classList.remove('hidden'); 
                Swal.fire({
                    background: '#ffffff', color: '#4f46e5', iconColor: '#4f46e5', icon: 'info', 
                    title: 'Đã gửi mã', text: 'Mã OTP đã được gửi vào Email.', 
                    toast: true, position: 'top-end', timer: 4000, showConfirmButton: false, customClass: {popup: 'border border-indigo-100 rounded-xl shadow-lg'}
                });
            } else { showError(r.msg); } 
        }
        
        async function resetByOtp() { 
            const btn = document.getElementById('btnResetByOtp');
            btn.disabled = true; btn.innerText = 'ĐANG XỬ LÝ...'; 
            const r=await postData('/api/auth/reset-by-otp',{dinh_danh:document.getElementById('otpUser').value, otp:document.getElementById('otpInput').value, pass_moi:document.getElementById('otpNewPass').value}); 
            btn.disabled = false; btn.innerText = 'XÁC NHẬN & GHI ĐÈ';

            if(r.status==='ok') { showSuccess('Khôi phục mật khẩu thành công!'); } 
            else { showError(r.msg); } 
        }
    </script>
    {{ template "footer" . }}
{{ end }}
