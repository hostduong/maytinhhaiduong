{{ define "header" }}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{{ .TieuDe }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/99k-style.css"> 
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50">
    <header class="bg-white border-b border-slate-100 sticky top-0 z-50 animate-[fadeIn_0.5s_ease-out]">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center font-black animate-[led-run_2s_infinite]">99</div>
                <span class="text-2xl font-black text-slate-900 group-hover:text-purple-600 transition">99K<span class="text-purple-500">.vn</span></span>
            </a>
            <div class="flex items-center gap-2">
                <a href="/bang-gia" class="text-xs uppercase font-bold text-slate-600 px-5 py-3 rounded-lg hover:bg-purple-50 hover:text-purple-600 transition">Bảng giá</a>
                {{ if .DaDangNhap }}
                    <a href="/logout" class="text-xs uppercase font-bold text-slate-600 px-5 py-3 rounded-lg hover:bg-slate-100">Đăng xuất</a>
                    <a href="/master/tong-quan" class="text-xs uppercase font-bold text-white bg-slate-900 px-6 py-3 rounded-lg hover:bg-purple-600 transition">Văn phòng</a>
                {{ else }}
                    <a href="/login" class="text-xs uppercase font-bold text-purple-600 px-5 py-3 rounded-lg hover:bg-purple-50transition">Đăng nhập</a>
                    <a href="/register" class="text-xs uppercase font-bold text-white bg-slate-900 px-6 py-3 rounded-lg hover:bg-purple-600 transition">Dùng thử</a>
                {{ end }}
            </div>
        </nav>
    </header>
    <main>
{{ end }}

{{ define "footer" }}
    </main>
    <footer class="bg-slate-950 text-slate-500 py-16">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="font-black text-2xl text-white mb-6">99K<span class="text-purple-500">.vn</span></p>
            <p class="text-sm font-bold mb-3">&copy; 2024 Nền tảng SaaS quản lý cửa hàng máy tính.</p>
            <p class="text-xs">Giải pháp được tối ưu trên Google Sheet & Master API.</p>
        </div>
    </footer>
</body>
</html>
{{ end }}
