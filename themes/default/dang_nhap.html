{{ define "dang_nhap" }}
    {{ template "header" . }}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        input::-ms-reveal, input::-ms-clear { display: none; }
        input[type="password"]::-webkit-reveal, input[type="password"]::-webkit-clear { display: none; }
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: #1f2937 !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        .input-error { border-color: #ef4444 !important; background-color: #fef2f2; }
        .input-success { border-color: #22c55e !important; background-color: #f0fdf4; }
        .input-normal { border-color: #d1d5db !important; background-color: #ffffff; }
        .error-text { color: #ef4444; font-size: 0.75rem; margin-top: 0.25rem; display: none; }
        .error-text.show { display: block; }
        button:disabled { opacity: 0.6; cursor: not-allowed; background-color: #9ca3af !important; }
        
        /* Gọt nền đen của SweetAlert2 */
        .swal2-popup { padding: 0 !important; background: transparent !important; }
    </style>

    <div class="flex items-center justify-center min-h-[calc(100vh-200px)] py-12 px-4 bg-gray-50">
        <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl shadow-blue-900/5 border border-blue-50 relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-50 text-blue-600 mb-4 border border-blue-100 shadow-inner">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight">Đăng Nhập</h2>
                <p class="mt-2 text-sm text-slate-500 font-medium">Chào mừng bạn quay trở lại ^^</p>
            </div>

            {{ if .Loi }}
            <script>
                document.addEventListener('DOMContentLoaded', () => {
                    const loiMsg = "{{ .Loi }}";
                    Swal.fire({
                        background: 'transparent', backdrop: 'rgba(15, 23, 42, 0.5)', showConfirmButton: false,
                        html: `
                        <div class="relative p-[2px] rounded-[1.5rem] bg-gradient-to-r from-red-500 to-orange-500 shadow-2xl shadow-red-500/20 max-w-[360px] mx-auto">
                            <div class="bg-white rounded-[1.4rem] p-8 flex flex-col items-center text-center">
                                <div class="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mb-4 text-red-500 border border-red-100">
                                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                </div>
                                <h2 class="text-2xl font-black text-slate-800 mb-2">Thất Bại</h2>
                                <p class="font-medium text-slate-500 mb-8">${loiMsg}</p>
                                <button onclick="Swal.close()" class="w-full py-3 px-4 rounded-xl text-white bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 font-bold shadow-md active:scale-95 transition">Đã Hiểu</button>
                            </div>
                        </div>`
                    });
                });
            </script>
            {{ end }}

            <form id="formLogin" class="space-y-6" action="/login" method="POST" autocomplete="off">
                <input type="text" style="display:none" autocomplete="username">
                <input type="password" style="display:none" autocomplete="current-password">

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Định Danh / Email</label>
                        <input id="user" name="input_dinh_danh" type="text" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition font-bold text-slate-800" placeholder="Nhập ID hoặc Email..." autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');" required>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Mật khẩu</label>
                            <a href="/forgot-password" class="text-xs font-bold text-blue-600 hover:text-blue-700 transition">Quên mật khẩu?</a>
                        </div>
                        <div class="relative">
                            <input id="pass" name="mat_khau" type="password" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition font-mono tracking-[0.2em] font-bold text-slate-800 pr-10" placeholder="••••••••" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');" required>
                            <button type="button" onclick="togglePass('pass')" tabindex="-1" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-blue-600 transition">
                                <svg id="eye_slash_pass" class="w-5 h-5 block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.661-4.136m2.536-2.036A10.04 10.04 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.05 10.05 0 01-2.661 4.136M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/></svg>
                                <svg id="eye_open_pass" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex items-center mt-2">
                    <input id="remember" name="ghi_nho" type="checkbox" class="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded cursor-pointer accent-blue-600">
                    <label for="remember" class="ml-2 block text-sm font-semibold text-slate-600 cursor-pointer select-none">Ghi nhớ đăng nhập</label>
                </div>

                <button type="submit" id="btnSubmit" class="w-full flex justify-center py-4 px-4 border border-transparent text-sm font-black rounded-xl text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition transform active:scale-95 uppercase tracking-widest mt-6">
                    ĐĂNG NHẬP
                </button>

                <div class="text-center mt-8 pt-6 border-t border-slate-100">
                    <span class="text-sm font-medium text-slate-500">Chưa có tài khoản? </span>
                    <a href="/register" class="text-sm font-bold text-blue-600 hover:text-blue-800 transition">Tạo ngay</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const eyeSlash = document.getElementById('eye_slash_' + id);
            const eyeOpen = document.getElementById('eye_open_' + id);
            if (input.type === "password") {
                input.type = "text"; eyeSlash.classList.add('hidden'); eyeOpen.classList.remove('hidden');
            } else {
                input.type = "password"; eyeOpen.classList.add('hidden'); eyeSlash.classList.remove('hidden');
            }
        }

        document.getElementById('formLogin').addEventListener('submit', function(e) {
            const btn = document.getElementById('btnSubmit');
            btn.setAttribute('disabled', 'true');
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> ĐANG KẾT NỐI...`;
        });
    </script>
    {{ template "footer" . }}
{{ end }}
