{{ define "bang_gia" }}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{{ .TieuDe }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/99k-style.css"> 
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen py-12 flex flex-col items-center">
    <div class="max-w-5xl mx-auto px-4 w-full">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-black text-gradient-animated mb-4 tracking-tight">Bảng Giá Dịch Vụ</h1>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-sm">Chọn gói khởi đầu để bắt đầu kinh doanh</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            {{ range .ListGoi }}
            <div class="bg-white border border-slate-200 rounded-[2.5rem] p-8 shadow-sm hover:shadow-2xl transition duration-500 flex flex-col group relative">
                <div class="mb-6 border-b border-slate-50 pb-6 text-center">
                    <h3 class="text-xl font-black text-slate-800 uppercase tracking-tighter">{{ .TenGoi }}</h3>
                    <div class="mt-4 flex items-baseline justify-center gap-1">
                        <span class="text-4xl font-black text-purple-600 tracking-tighter">{{ format_money .GiaBan }}₫</span>
                        <span class="text-slate-400 font-bold text-xs">/{{ .ThoiHanNgay }} ngày</span>
                    </div>
                </div>
                <div class="flex-1 space-y-4 mb-8">
                    {{ range split .MoTa "|" }}
                        <div class="flex items-center gap-3 text-[13px] font-bold text-slate-500">
                            <div class="w-5 h-5 rounded-full bg-emerald-50 flex items-center justify-center border border-emerald-100">
                                <svg class="w-3 h-3 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            {{ . }}
                        </div>
                    {{ end }}
                </div>
                <button onclick="moModalMua('{{ .MaGoi }}', '{{ .TenGoi }}', {{ .GiaBan }})" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest text-[11px] hover:bg-purple-600 transition shadow-lg active:scale-95">
                    Đăng Ký Ngay
                </button>
            </div>
            {{ end }}
        </div>
    </div>

    <script>
        // JS gọi API để Check giá và Mua gói
        async function checkGiaTuServer(maGoi, maCode) {
            const fd = new FormData();
            fd.append('ma_goi', maGoi);
            fd.append('ma_code', maCode);
            const res = await fetch('/bang-gia/api/check-price', { method: 'POST', body: fd });
            return await res.json();
        }

        async function moModalMua(maGoi, tenGoi, giaGoc) {
            // ... (Logic SweetAlert như bản trước, gọi URL /bang-gia/api/mua-goi)
        }
    </script>
</body>
</html>
{{ end }}
