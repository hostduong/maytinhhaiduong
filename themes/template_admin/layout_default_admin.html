{{ define "header_default_admin" }}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ .TieuDe }} - 99K.vn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/99k-style.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Auto-fill fix cho các form đăng nhập */
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: #4c1d95 !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        input::-ms-reveal, input::-ms-clear { display: none; }
        input[type="password"]::-webkit-reveal, input[type="password"]::-webkit-clear { display: none; }
        
        /* Logo Premium CSS từ Master */
        .logo-premium-icon {
            position: relative; background: linear-gradient(135deg, #9333ea, #6366f1);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.4); overflow: hidden;
        }
        .logo-premium-icon::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
            transform: skewX(-25deg); animation: logo-sweep-shine 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes logo-sweep-shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        
        .logo-premium-text-light {
            background: linear-gradient(to right, #4c1d95, #9333ea, #4f46e5, #4c1d95);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: text-shine-logo 4s linear infinite;
        }
        @keyframes text-shine-logo { to { background-position: 200% center; } }
    </style>
</head>
<body class="min-h-screen w-full relative overflow-x-hidden bg-slate-50 flex flex-col text-slate-800">
    
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-purple-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-600/10 rounded-full blur-[120px]"></div>
    </div>
    
    <div class="relative z-10 w-full pt-10 pb-6 flex justify-center">
        <a href="/" class="flex items-center gap-3 group">
            <div class="w-12 h-12 rounded-[14px] logo-premium-icon flex items-center justify-center text-white group-hover:scale-105 transition transform shadow-lg shadow-indigo-500/30">
                <svg class="w-6 h-6 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <span class="text-[28px] font-black logo-premium-text-light tracking-tight">99K<span class="text-purple-600">.vn</span></span>
        </a>
    </div>

    <main class="relative z-10 flex-1 flex items-start justify-center px-4 pb-12">
{{ end }}

{{ define "footer_default_admin" }}
    </main>
</body>
</html>
{{ end }}
