{{ define "quen_mat_khau_admin" }}
    {{ template "header_default_admin" . }}
    
    <div class="w-full max-w-md led-border-wrapper">
        <div class="led-border-inner p-8 sm:p-10">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black title-gradient-purple tracking-tight">Khôi Phục Mật Khẩu</h2>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-2">Xác Thực Bằng Email (OTP)</p>
            </div>

            <div id="formEmail" class="space-y-6">
                <input type="text" style="display:none" autocomplete="username">
                <input type="password" style="display:none" autocomplete="new-password">

                <div id="step1" class="space-y-5">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Định Danh / Email Cửa Hàng</label>
                        <input type="text" id="otpUser" placeholder="Shopcuaban hoặc Email..." class="input-premium font-bold text-violet-900" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                    </div>
                    <button id="btnSendOtp" onclick="sendOtp()" class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 text-white py-4 rounded-xl font-black tracking-[0.1em] uppercase hover:from-violet-700 hover:to-indigo-700 shadow-lg shadow-violet-500/30 transition active:scale-95">GỬI MÃ ĐẾN EMAIL</button>
                </div>
                
                <div id="step2" class="hidden space-y-5">
                    <div>
                        <label class="block text-[11px] font-bold text-emerald-600 uppercase tracking-wider mb-1.5">Nhập Mã OTP (6 số)</label>
                        <input type="text" id="otpInput" maxlength="6" placeholder="••••••" class="input-premium !border-emerald-300 font-mono tracking-[0.4em] font-bold text-emerald-700 text-center focus:!border-emerald-500 focus:!ring-emerald-500/20" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Mật Khẩu Mới</label>
                        <div class="relative">
                            <input type="password" id="otpNewPass" placeholder="Nhập mật khẩu mới..." class="input-premium font-mono tracking-[0.2em] font-bold text-slate-800 pr-10" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');">
                            <button type="button" onclick="togglePass('otpNewPass')" tabindex="-1" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-violet-600 transition">
                                <svg id="eye_slash_otpNewPass" class="w-5 h-5 block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.661-4.136m2.536-2.036A10.04 10.04 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.05 10.05 0 01-2.661 4.136M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/></svg>
                                <svg id="eye_open_otpNewPass" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </div>
                    <button id="btnResetByOtp" onclick="resetByOtp()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-white py-4 rounded-xl font-black tracking-[0.1em] uppercase hover:from-emerald-600 hover:to-teal-600 shadow-lg shadow-emerald-500/30 transition active:scale-95">XÁC NHẬN THAY ĐỔI</button>
                </div>
            </div>

            <div class="mt-8 pt-6 text-center border-t border-slate-100">
                <a href="/login" class="text-[12px] font-bold text-slate-500 hover:text-violet-600 uppercase tracking-widest transition flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Quay Về Đăng Nhập
                </a>
            </div>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id); const eyeSlash = document.getElementById('eye_slash_' + id); const eyeOpen = document.getElementById('eye_open_' + id);
            if (input.type === "password") { input.type = "text"; eyeSlash.classList.add('hidden'); eyeOpen.classList.remove('hidden'); } else { input.type = "password"; eyeOpen.classList.add('hidden'); eyeSlash.classList.remove('hidden'); }
        }

        async function postData(url, d) { const fd=new FormData(); for(const k in d) fd.append(k,d[k]); try{ const r=await fetch(url,{method:'POST',body:fd}); return await r.json(); }catch(e){return {status:'error',msg:'Lỗi mạng'};} }

        async function sendOtp() { 
            const userVal = document.getElementById('otpUser').value.trim();
            if (!userVal) { showError('Vui lòng nhập định danh.'); return; }
            const btn = document.getElementById('btnSendOtp');
            btn.disabled = true; btn.innerHTML = '<div class="spinner-led-btn mr-2"></div> ĐANG GỬI...'; 
            const r=await postData('/api/auth/send-otp',{dinh_danh:userVal}); 
            btn.disabled = false; btn.innerText = 'GỬI MÃ ĐẾN EMAIL';

            if(r.status==='ok'){ 
                document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); 
                showSuccess('Tín Hiệu Đã Gửi', 'Mã xác thực OTP đã được gửi đến email đăng ký của bạn.', 'Tiếp Tục', null);
            } else { showError(r.msg); } 
        }
        
        async function resetByOtp() { 
            const btn = document.getElementById('btnResetByOtp');
            btn.disabled = true; btn.innerHTML = '<div class="spinner-led-btn mr-2"></div> ĐANG XỬ LÝ...'; 
            const r=await postData('/api/auth/reset-by-otp',{dinh_danh:document.getElementById('otpUser').value, otp:document.getElementById('otpInput').value, pass_moi:document.getElementById('otpNewPass').value}); 
            btn.disabled = false; btn.innerText = 'XÁC NHẬN THAY ĐỔI';

            if(r.status==='ok') { showSuccess('Đã Khôi Phục', 'Mật khẩu đã được thay đổi thành công!', 'Về Đăng Nhập', '/login'); } else { showError(r.msg); } 
        }
    </script>
    {{ template "footer_default_admin" . }}
{{ end }}
