{{ define "dang_nhap_admin" }}
    {{ template "header_default_admin" . }}

    <div class="w-full max-w-md bg-white/80 backdrop-blur-xl p-8 rounded-[2rem] shadow-2xl shadow-purple-900/5 border border-white relative mt-4">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black title-gradient-purple tracking-tight">Đăng Nhập</h2>
            <p class="mt-2 text-sm text-slate-500 font-medium">Truy cập Quản trị Cửa hàng</p>
        </div>

        {{ if .Loi }}
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                // [ĐÃ FIX]: Ép Go hiểu đây là 1 chuỗi String an toàn
                const loiMsg = "{{ .Loi }}";

                Swal.fire({
                    title: '<div class="flex flex-col items-center gap-3"><div class="w-16 h-16 bg-gradient-to-br from-red-100 to-orange-100 text-orange-600 rounded-full flex items-center justify-center shadow-inner border border-orange-200"><svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg></div><span class="text-3xl font-black title-gradient-red">Thất Bại</span></div>',
                    // [ĐÃ FIX]: Dùng nối chuỗi JS bình thường thay vì nháy ngược backtick
                    html: '<div class="text-[15px] text-orange-900 font-medium px-4">' + loiMsg + '</div>',
                    customClass: { popup: 'swal-master-error', confirmButton: 'bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold rounded-xl px-8 py-3 shadow-lg shadow-orange-200 transition transform hover:-translate-y-0.5 active:scale-95' },
                    buttonsStyling: false, confirmButtonText: 'Đã hiểu'
                });
            });
        </script>
        {{ end }}

        <form id="formLogin" class="space-y-6" action="/login" method="POST" autocomplete="off">
            <input type="text" style="display:none" autocomplete="username">
            <input type="password" style="display:none" autocomplete="current-password">

            <div class="space-y-5">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Tên miền / Email</label>
                    <input id="user" name="input_dinh_danh" type="text" class="input-premium font-bold text-purple-900" placeholder="shopcuaban hoặc email" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');" required>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider">Mật khẩu</label>
                        <a href="/forgot-password" class="text-[11px] font-bold text-purple-600 hover:text-purple-800 transition">Quên mật khẩu?</a>
                    </div>
                    <div class="relative">
                        <input id="pass" name="mat_khau" type="password" class="input-premium font-mono tracking-[0.2em] font-bold text-slate-800 pr-10" placeholder="••••••••" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');" required>
                        <button type="button" onclick="togglePass('pass')" tabindex="-1" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-purple-600 transition">
                            <svg id="eye_slash_pass" class="w-5 h-5 block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.661-4.136m2.536-2.036A10.04 10.04 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.05 10.05 0 01-2.661 4.136M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/></svg>
                            <svg id="eye_open_pass" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex items-center mt-2">
                <input id="remember" name="ghi_nho" type="checkbox" class="w-4 h-4 text-purple-600 focus:ring-purple-500 border-slate-300 rounded cursor-pointer accent-purple-600">
                <label for="remember" class="ml-2 block text-sm font-bold text-slate-600 cursor-pointer select-none">Duy trì đăng nhập 30 ngày</label>
            </div>

            <button type="submit" id="btnSubmit" class="w-full flex justify-center py-4 px-4 border border-transparent text-[13px] font-black rounded-xl text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 shadow-lg shadow-purple-500/30 transition transform active:scale-95 uppercase tracking-widest mt-6">
                VÀO HỆ THỐNG
            </button>

            <div class="text-center mt-8 pt-6 border-t border-slate-100">
                <span class="text-[13px] font-medium text-slate-500">Chưa có tài khoản? </span>
                <a href="/register" class="text-[13px] font-black text-purple-600 hover:text-purple-800 transition">Đăng ký ngay</a>
            </div>
        </form>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const eyeSlash = document.getElementById('eye_slash_' + id); const eyeOpen = document.getElementById('eye_open_' + id);
            if (input.type === "password") { input.type = "text"; eyeSlash.classList.add('hidden'); eyeOpen.classList.remove('hidden'); } 
            else { input.type = "password"; eyeOpen.classList.add('hidden'); eyeSlash.classList.remove('hidden'); }
        }
        document.getElementById('formLogin').addEventListener('submit', function() {
            const btn = document.getElementById('btnSubmit'); btn.setAttribute('disabled', 'true');
            btn.innerHTML = '<div class="spinner-led-btn mr-2"></div> ĐANG KIỂM TRA...';
        });
    </script>
    {{ template "footer_default_admin" . }}
{{ end }}
